name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feature/**

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  cms:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore cms/HugoPortfolio.Cms.slnx

      - name: Build
        run: dotnet build cms/HugoPortfolio.Cms.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test cms/HugoPortfolio.Cms.slnx --configuration Release --no-build

      - name: Publish
        run: dotnet publish cms/HugoPortfolio.Cms/HugoPortfolio.Cms.csproj --configuration Release --no-build --output cms/publish
