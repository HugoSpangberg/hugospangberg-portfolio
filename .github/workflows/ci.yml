name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feature/**

jobs:
  client:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:client

      - name: Build
        run: npm run build:client

  dotnet:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore HugoSpangberg.Portfolio.sln

      - name: Build
        run: dotnet build HugoSpangberg.Portfolio.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test HugoSpangberg.Portfolio.sln --configuration Release --no-build

      - name: Publish API
        run: dotnet publish HSApi/HSApi.csproj --configuration Release --no-build --output artifacts/HSApi

      - name: Publish CMS
        run: dotnet publish HSCms/HSCms.csproj --configuration Release --no-build --output artifacts/HSCms

  assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate career-world model manifest
        run: npm run models:validate
